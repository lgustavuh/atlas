services:
  # Aplicação PHP-FPM
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        UID: ${UID:-1000}
        GID: ${GID:-1000}
    container_name: etc_app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/php.ini:/usr/local/etc/php/conf.d/zzz-custom.ini:ro
      - ./docker/php/www.conf:/usr/local/etc/php-fpm.d/www.conf:ro
    networks:
      - etc_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Servidor web Nginx
  nginx:
    image: nginx:1.27-alpine
    container_name: etc_nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:80"
    volumes:
      - ./:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/security-headers.conf:/etc/nginx/conf.d/security-headers.conf:ro
    networks:
      - etc_net
    depends_on:
      - app

  # Banco de dados PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: etc_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-atlas}
      POSTGRES_USER: ${DB_USERNAME:-etc_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-change_me_in_env}
      # Boa prática: forçar autenticação por senha SCRAM-SHA-256 (padrão no PG14+)
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    ports:
      # Exposta para você poder conectar com DBeaver/pgAdmin durante o dev
      # Em produção, REMOVA este mapeamento
      - "${DB_PORT:-5432}:5432"
    networks:
      - etc_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-etc_user} -d ${DB_DATABASE:-atlas}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis para sessões, cache e filas
  redis:
    image: redis:7-alpine
    container_name: etc_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-change_me_in_env} --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - etc_net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-change_me_in_env}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Mailpit: captura todos os emails enviados pela aplicação em dev
  # Acesse a UI em http://localhost:8025
  mailpit:
    image: axllent/mailpit:latest
    container_name: etc_mailpit
    restart: unless-stopped
    ports:
      - "${MAIL_PORT:-1025}:1025"  # SMTP
      - "${MAIL_UI_PORT:-8025}:8025"  # Interface web
    networks:
      - etc_net

networks:
  etc_net:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
