# ===================================================================
#   Atlas - Nginx para producao em container
#   Roda em foreground, escuta na porta injetada via $PORT
# ===================================================================

worker_processes auto;
pid /var/run/nginx.pid;
error_log /dev/stderr warn;

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # Log para stdout (Railway captura)
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';
    access_log /dev/stdout main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;
    client_max_body_size 20m;

    # Compressao (HTML, JSON, CSS, JS) - reduz banda do Railway
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/javascript
        application/json
        application/xml
        font/opentype
        image/svg+xml
        text/css
        text/html
        text/plain
        text/xml;

    # File descriptor cache: nginx mantem fd dos arquivos mais acessados em RAM
    open_file_cache max=2000 inactive=20s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors off;

    # Upstream PHP-FPM (mesmo container, socket TCP)
    upstream php-upstream {
        server 127.0.0.1:9000;
    }

    server {
        # Railway injeta a porta via $PORT. Default 8080 em local.
        listen __PORT__ default_server;
        listen [::]:__PORT__ default_server;

        server_name _;
        root /var/www/public;
        index index.php index.html;
        charset utf-8;

        # Bloqueia acesso a arquivos sensiveis
        location ~ /\.(?!well-known) { deny all; }
        location ~* /\.(env|git|htaccess) { deny all; }
        location ~ ^/(app|bootstrap|config|database|resources|routes|storage|tests|vendor)/ {
            deny all;
        }

        # Front controller pattern do Laravel
        location / {
            try_files $uri $uri/ /index.php?$query_string;
        }

        location = /favicon.ico { access_log off; log_not_found off; }
        location = /robots.txt  { access_log off; log_not_found off; }

        # Healthcheck (Railway usa pra saber que o container subiu)
        location = /health {
            access_log off;
            try_files $uri /index.php?$query_string;
        }

        # Livewire serve livewire.js via PHP - NAO pode ser tratado como asset estatico
        location ~* ^/livewire/ {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # Cache agressivo para assets estaticos com hash no nome (Vite)
        location ~* \.(css|js|jpg|jpeg|png|gif|ico|woff|woff2|ttf|svg|webp)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
            access_log off;
            try_files $uri =404;
        }

        # PHP processado pelo PHP-FPM no mesmo container
        location ~ \.php$ {
            fastcgi_split_path_info ^(.+\.php)(/.+)$;
            fastcgi_pass php-upstream;
            fastcgi_index index.php;
            include fastcgi_params;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            fastcgi_param PATH_INFO $fastcgi_path_info;
            fastcgi_read_timeout 60;
        }
    }
}
