; ===================================================================
;  PHP-FPM Pool Config - Atlas
;  Otimizado para uma prefeitura com ~50 usuarios simultaneos.
; ===================================================================
;
;  Para uma prefeitura pequena (50 colaboradores ativos no sistema),
;  com cerca de 10-20 sessoes concorrentes em picos, esta config:
;
;    - Mantem 8 workers prontos pra responder na hora (sem latencia
;      de fork) durante o dia inteiro
;    - Permite escalar ate 25 workers em picos de uso
;    - Mata workers ociosos por mais de 60s pra liberar memoria
;
;  Estimativa de memoria: 25 workers x ~50MB = 1.2GB max
;  (cada worker tem opcache compartilhado, entao o overhead real
;   por worker e bem menor que isso na pratica)
;
;  Se a base de usuarios crescer pra 100+ simultaneos:
;    pm.max_children = 50
;    pm.start_servers = 15
;    pm.max_spare_servers = 30
; ===================================================================

[www]
user = www-data
group = www-data

listen = 9000
listen.owner = www-data
listen.group = www-data

; ---- Pool Manager: 'dynamic' = balanca latencia e memoria ----
; 'static' = sempre N workers (gasta mais RAM mas latencia menor)
; 'ondemand' = forka quando chega request (menos RAM mas mais latencia)
; 'dynamic' = mantem um pool quente, escala conforme demanda
pm = dynamic

; Maximo de workers simultaneos
pm.max_children = 25

; Workers iniciados ao subir o pool
pm.start_servers = 8

; Numero minimo de workers ociosos (prontos pra responder na hora)
pm.min_spare_servers = 5

; Numero maximo de workers ociosos (acima disso, mata os extras)
pm.max_spare_servers = 12

; Quantos requests cada worker atende antes de morrer e renascer
; (evita memory leaks de eventuais bibliotecas)
pm.max_requests = 500

; Tempo maximo que um worker fica ocioso antes de morrer (segundos)
pm.process_idle_timeout = 60s

; ---- Logging ----
access.log = /proc/self/fd/2
catch_workers_output = yes
decorate_workers_output = no

; ---- Status page (util pra debug, so via socket interno) ----
pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

; ---- Timeouts ----
; Tempo maximo de execucao por request (segundos)
request_terminate_timeout = 60s
; Loga requests que demoram mais que isso
request_slowlog_timeout = 5s
slowlog = /proc/self/fd/2

; ---- Limites ----
; Pode passar como ENV vars via docker-compose
clear_env = no
