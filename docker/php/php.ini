; ===========================================
; Configurações customizadas do PHP
; Sobrescrevem o php.ini-production padrão
; ===========================================

; --- Performance ---
memory_limit = 256M
max_execution_time = 60
max_input_time = 60
post_max_size = 32M
upload_max_filesize = 30M
max_file_uploads = 20

; --- OPcache (acelerador de bytecode PHP) ---
opcache.enable = 1
opcache.enable_cli = 0
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 32
opcache.max_accelerated_files = 20000
opcache.fast_shutdown = 1
opcache.jit = tracing
opcache.jit_buffer_size = 128M

; Em dev (APP_ENV=local), valide arquivos a cada request pra mudancas refletirem.
; Em producao, desabilite: opcache.validate_timestamps = 0 e dump cache em deploy
; com `php artisan opcache:clear` ou restart do container.
; Vamos default produtivo: valida a cada 60s (bom equilibrio)
opcache.validate_timestamps = 1
opcache.revalidate_freq = 60

; Pre-load do framework Laravel (avancado - desabilitado por enquanto, exige config extra)
; opcache.preload = /var/www/preload.php
; opcache.preload_user = www-data

; --- Realpath cache (acelera resolucao de paths nos requires) ---
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; --- Segurança ---
; Não exibir versão do PHP no header HTTP
expose_php = Off

; Esconder erros em produção (sobrescrever em dev via APP_DEBUG do Laravel)
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php_errors.log

; Desabilitar funcoes perigosas.
;
; IMPORTANTE: proc_open, popen e parse_ini_file NAO estao na lista porque sao usadas:
;   - proc_open / popen: Composer (package:discover), Artisan (Process facade), filas
;   - parse_ini_file: Laravel le configs INI internamente em alguns componentes
;
; As funcoes mantidas bloqueadas (exec, passthru, shell_exec, system) sao as principais
; vias de RCE; manter desabilitadas reduz superficie de ataque sem quebrar o framework.
disable_functions = exec,passthru,shell_exec,system,curl_multi_exec,show_source

; Sessoes seguras
; cookie_secure = 0 em dev (HTTP); o middleware do Laravel ajusta em producao via SESSION_SECURE_COOKIE
session.cookie_httponly = 1
session.cookie_secure = 0
session.cookie_samesite = "Lax"
session.use_strict_mode = 1
session.use_only_cookies = 1

; --- Timezone ---
date.timezone = America/Sao_Paulo

; --- Locale ---
default_charset = "UTF-8"
