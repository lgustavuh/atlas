server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /var/www/public;
    index index.php index.html;

    # Charset padrão
    charset utf-8;

    # ---- Performance: compressão gzip ----
    # Reduz JS/CSS em ~70% (50KB CSS vira ~9KB no fio)
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        application/atom+xml
        application/javascript
        application/json
        application/ld+json
        application/manifest+json
        application/rss+xml
        application/vnd.geo+json
        application/vnd.ms-fontobject
        application/x-font-ttf
        application/x-web-app-manifest+json
        application/xhtml+xml
        application/xml
        font/opentype
        image/bmp
        image/svg+xml
        image/x-icon
        text/cache-manifest
        text/css
        text/html
        text/plain
        text/vcard
        text/vnd.rim.location.xloc
        text/vtt
        text/x-component
        text/x-cross-domain-policy;

    # ---- Performance: cache de file descriptors ----
    # Nginx mantem fd dos arquivos mais acessados em cache de RAM
    open_file_cache max=2000 inactive=20s;
    open_file_cache_valid 60s;
    open_file_cache_min_uses 2;
    open_file_cache_errors off;

    # Logs
    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    # Tamanho máximo de upload (deve bater com php.ini)
    client_max_body_size 32M;

    # Esconder versão do Nginx
    server_tokens off;

    # Inclui headers de segurança (arquivo separado)
    include /etc/nginx/conf.d/security-headers.conf;

    # Bloqueia acesso a arquivos sensíveis
    location ~ /\.(?!well-known) {
        deny all;
    }

    location ~* /\.(env|git|htaccess|svn) {
        deny all;
        return 404;
    }

    # Bloqueia acesso direto a arquivos PHP fora do public/
    location ~ ^/(app|bootstrap|config|database|resources|routes|storage|tests|vendor)/ {
        deny all;
        return 404;
    }

    # Rota principal
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Favicon e robots.txt
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Cache de assets estáticos
    # IMPORTANTE: /livewire/ é uma rota dinâmica (Livewire serve livewire.js via PHP).
    # Sem essa exclusão, /livewire/livewire.js cai aqui e retorna 404 (arquivo nao existe
    # no filesystem), quebrando o login (sintoma: dados aparecem na URL apos submit).
    location ~* ^/livewire/ {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~* \.(css|js|jpg|jpeg|png|gif|ico|woff|woff2|ttf|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Processamento PHP via FastCGI
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_param HTTPS $https if_not_empty;

        # Timeouts
        fastcgi_read_timeout 300;
        fastcgi_send_timeout 300;
        fastcgi_connect_timeout 60;

        # Buffer
        fastcgi_buffer_size 16k;
        fastcgi_buffers 4 16k;
    }

    # Bloqueia .php em qualquer outro lugar
    location ~ \.php$ {
        deny all;
        return 404;
    }
}
