# ===============================================
# Headers de Segurança HTTP
# Protegem contra XSS, clickjacking, MIME sniffing
# ===============================================

# Previne clickjacking — site não pode ser embutido em iframe externo
add_header X-Frame-Options "SAMEORIGIN" always;

# Previne MIME sniffing — navegador não tenta adivinhar tipo do conteúdo
add_header X-Content-Type-Options "nosniff" always;

# Política de Referrer — não vaza URLs para sites externos
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# HSTS — força HTTPS (descomente em produção com HTTPS configurado)
# add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Permissions Policy — bloqueia APIs do navegador não usadas
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

# Content Security Policy — controla origens de scripts/estilos/imagens
# Ajustar conforme as integrações que o sistema venha a usar
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'" always;

# XSS Protection (legado, mas não prejudica)
add_header X-XSS-Protection "1; mode=block" always;
